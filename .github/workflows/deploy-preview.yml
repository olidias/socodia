name: Deploy Preview

on:
  push:
    branches-ignore: [master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute preview tag
        id: tag
        run: |
          # Use PR number if available, otherwise slugify branch name
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            SLUG="pr-${{ github.event.pull_request.number }}"
          else
            SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${{ github.repository }}:preview-$SLUG" >> $GITHUB_OUTPUT
          echo "hostname=preview-$SLUG.socodia.com" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify preview deploy
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_PREVIEW_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const hostname = '${{ steps.tag.outputs.hostname }}';
            const body = `Preview deployed to: https://${hostname}`;
            // Update existing comment if present, otherwise create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('Preview deployed to:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
